name: FleetFill Admin Web Manual Vercel Deploy

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_ADMIN_WEB_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel preview configuration
        id: config
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping preview deploy because Vercel configuration is incomplete."
          fi

      - name: Set up pnpm
        if: steps.config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: admin-web/pnpm-lock.yaml

      - name: Verify Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel --version

      - name: Pull preview environment
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel pull --cwd admin-web --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview deployment
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel build --cwd admin-web --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel deploy --cwd admin-web --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  production:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_ADMIN_WEB_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel production configuration
        id: config
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping production deploy because Vercel configuration is incomplete."
          fi

      - name: Set up pnpm
        if: steps.config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: admin-web/pnpm-lock.yaml

      - name: Verify Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel --version

      - name: Pull production environment
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel pull --cwd admin-web --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production deployment
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel build --cwd admin-web --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        if: steps.config.outputs.configured == 'true'
        run: pnpm dlx vercel deploy --cwd admin-web --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
