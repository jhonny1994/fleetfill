name: Release Candidate Verification

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record target
        run: |
          echo "Preparing release candidate verification."
          echo "Commit SHA: $GITHUB_SHA"
          echo "Tagged release required before production rollout."

      - name: Verify changelog entry matches app version
        run: |
          VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          content = Path('pubspec.yaml').read_text(encoding='utf-8')
          match = re.search(r'^version:\s*([^\s]+)', content, re.MULTILINE)
          if not match:
              raise SystemExit('pubspec version not found')
          print(match.group(1).split('+')[0])
          PY
          )
          grep -q "## \[$VERSION\]" CHANGELOG.md
          echo "Verified CHANGELOG.md entry for version $VERSION"

      - name: Require deployment credentials at runtime
        run: |
          test -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Output operational checklist reminder
        run: |
          echo "Run release rehearsal, rollback review, and release checklist before promotion."
