name: Staging And Release Candidate

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - release-candidate

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record target
        run: |
          echo "Preparing ${{ inputs.target }} verification."
          echo "Commit SHA: $GITHUB_SHA"
          echo "Tagged release required before production rollout."

      - name: Require environment secrets at runtime
        run: |
          test -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          test -n "${{ secrets.STAGING_SUPABASE_PROJECT_REF }}"

      - name: Output operational checklist reminder
        run: |
          echo "Run staging rehearsal, rollback review, and release checklist before promotion."
