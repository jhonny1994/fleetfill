name: Production Admin Web Netlify
run-name: >-
  Admin Web Netlify deploy (${{
    inputs.git_ref || github.ref_name
  }})

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
      sync_env:
        description: Sync Netlify production environment values before deploy
        type: boolean
        default: true
      deploy:
        description: Build and deploy admin-web to Netlify production
        type: boolean
        default: true
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      sync_env:
        required: false
        type: boolean
        default: true
      deploy:
        required: false
        type: boolean
        default: true

concurrency:
  group: production-admin-web-netlify
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy Admin Web To Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: Production
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    outputs:
      performed_work: ${{ steps.plan.outputs.performed_work }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Resolve deploy intent
        id: plan
        run: |
          if [[ "${{ inputs.sync_env }}" == "true" || "${{ inputs.deploy }}" == "true" ]]; then
            echo "performed_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "performed_work=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify deploy configuration is present
        if: steps.plan.outputs.performed_work == 'true'
        run: |
          missing=()

          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          }

          require_value "NETLIFY_AUTH_TOKEN (GitHub secret)" "$NETLIFY_AUTH_TOKEN"
          require_value "NETLIFY_SITE_ID (GitHub variable)" "$NETLIFY_SITE_ID"
          require_value "SUPABASE_URL (GitHub variable)" "$SUPABASE_URL"
          require_value "PUBLIC_SITE_URL (GitHub variable)" "$PUBLIC_SITE_URL"

          if [[ "${{ inputs.sync_env }}" == "true" ]]; then
            require_value "SUPABASE_ACCESS_TOKEN (GitHub secret)" "$SUPABASE_ACCESS_TOKEN"
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "Missing production admin-web deploy configuration:" >&2
            for item in "${missing[@]}"; do
              echo "  - $item" >&2
            done
            echo "" >&2
            echo "Populate them in GitHub Settings > Secrets and variables > Actions before rerunning this workflow." >&2
            exit 1
          fi

      - name: Set up pnpm
        if: steps.plan.outputs.performed_work == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        if: steps.plan.outputs.performed_work == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/admin-web/pnpm-lock.yaml

      - name: Set up Supabase CLI
        if: steps.plan.outputs.performed_work == 'true' && inputs.sync_env
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Netlify CLI
        if: steps.plan.outputs.performed_work == 'true'
        run: npm install --global netlify-cli@25.1.1

      - name: Install dependencies
        if: steps.plan.outputs.performed_work == 'true'
        working-directory: apps/admin-web
        run: pnpm install --frozen-lockfile

      - name: Resolve admin-web public runtime values
        if: steps.plan.outputs.performed_work == 'true'
        run: |
          supabase_project_ref="$(echo "${SUPABASE_URL}" | sed -E 's#https?://([^.]+)\.supabase\.co/?#\1#')"
          if [[ -z "$supabase_project_ref" || "$supabase_project_ref" == "${SUPABASE_URL}" ]]; then
            echo "Could not derive the Supabase project ref from SUPABASE_URL=${SUPABASE_URL}." >&2
            exit 1
          fi

          if [[ "${{ inputs.sync_env }}" == "true" ]]; then
            anon_key="$(supabase projects api-keys --project-ref "$supabase_project_ref" -o json | node -e "const fs=require('fs'); const keys=JSON.parse(fs.readFileSync(0,'utf8')); const anon=keys.find((entry)=>entry.name==='anon')?.api_key ?? ''; if (!anon) process.exit(1); process.stdout.write(anon);")"
          else
            anon_key=""
          fi

          echo "SUPABASE_PROJECT_REF=${supabase_project_ref}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_URL=https://${supabase_project_ref}.supabase.co" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=${PUBLIC_SITE_URL%/}" >> "$GITHUB_ENV"
          if [[ -n "$anon_key" ]]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${anon_key}" >> "$GITHUB_ENV"
          fi

      - name: Sync Netlify production environment
        if: steps.plan.outputs.performed_work == 'true' && inputs.sync_env
        run: |
          netlify env:set NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN" --force
          netlify env:set NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN" --force
          netlify env:set NEXT_PUBLIC_SITE_URL "$NEXT_PUBLIC_SITE_URL" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN" --force

      - name: Deploy production to Netlify
        if: steps.plan.outputs.performed_work == 'true' && inputs.deploy
        run: >
          netlify deploy
          --filter admin-web
          --context production
          --prod
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --message "Admin Web deploy ${GITHUB_SHA}"

      - name: Complete no-op validation
        if: steps.plan.outputs.performed_work != 'true'
        run: echo "No admin-web release actions were selected; reusable workflow validated inputs only."
