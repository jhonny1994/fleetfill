name: Production Supabase

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to roll out
        required: true
        default: main
      push_db:
        description: Push database migrations and seeds
        type: boolean
        default: true
      push_config:
        description: Push Supabase config
        type: boolean
        default: true
      sync_secrets:
        description: Sync hosted Supabase secrets
        type: boolean
        default: true
      deploy_functions:
        description: Deploy all Edge Functions
        type: boolean
        default: true
      configure_scheduler:
        description: Reinstall hosted scheduler
        type: boolean
        default: true
      verify_after:
        description: Run hosted verification after rollout
        type: boolean
        default: true

concurrency:
  group: production-supabase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET }}
      INTERNAL_AUTOMATION_TOKEN: ${{ secrets.INTERNAL_AUTOMATION_TOKEN }}
      TRANSACTIONAL_EMAIL_PROVIDER: ${{ vars.TRANSACTIONAL_EMAIL_PROVIDER }}
      TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT: ${{ vars.TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT }}
      TRANSACTIONAL_EMAIL_PROVIDER_API_KEY: ${{ secrets.TRANSACTIONAL_EMAIL_PROVIDER_API_KEY }}
      TRANSACTIONAL_EMAIL_FROM_EMAIL: ${{ vars.TRANSACTIONAL_EMAIL_FROM_EMAIL }}
      TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET: ${{ secrets.TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET }}
      PUSH_NOTIFICATIONS_ENABLED: ${{ vars.PUSH_NOTIFICATIONS_ENABLED }}
      PUSH_NOTIFICATIONS_PROVIDER: ${{ vars.PUSH_NOTIFICATIONS_PROVIDER }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Verify rollout configuration is present
        shell: bash
        run: |
          missing=()

          require_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          }

          require_secret "SUPABASE_ACCESS_TOKEN (GitHub secret)" "$SUPABASE_ACCESS_TOKEN"
          if [[ "${{ inputs.push_config }}" == "true" ]]; then
            require_secret "GOOGLE_WEB_CLIENT_ID (GitHub variable)" "$GOOGLE_WEB_CLIENT_ID"
            require_secret "SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET (GitHub secret)" "$SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET"
          fi
          if [[ "${{ inputs.sync_secrets }}" == "true" ]]; then
            require_secret "INTERNAL_AUTOMATION_TOKEN (GitHub secret)" "$INTERNAL_AUTOMATION_TOKEN"
            require_secret "TRANSACTIONAL_EMAIL_PROVIDER (GitHub variable)" "$TRANSACTIONAL_EMAIL_PROVIDER"
            require_secret "TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT (GitHub variable)" "$TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT"
            require_secret "TRANSACTIONAL_EMAIL_PROVIDER_API_KEY (GitHub secret)" "$TRANSACTIONAL_EMAIL_PROVIDER_API_KEY"
            require_secret "TRANSACTIONAL_EMAIL_FROM_EMAIL (GitHub variable)" "$TRANSACTIONAL_EMAIL_FROM_EMAIL"
            require_secret "TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET (GitHub secret)" "$TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET"
            require_secret "PUSH_NOTIFICATIONS_ENABLED (GitHub variable)" "$PUSH_NOTIFICATIONS_ENABLED"
            require_secret "PUSH_NOTIFICATIONS_PROVIDER (GitHub variable)" "$PUSH_NOTIFICATIONS_PROVIDER"
            require_secret "FIREBASE_SERVICE_ACCOUNT_JSON (GitHub secret)" "$FIREBASE_SERVICE_ACCOUNT_JSON"
          fi
          if [[ "${{ inputs.verify_after }}" == "true" ]]; then
            require_secret "VERCEL_TOKEN (GitHub secret)" "$VERCEL_TOKEN"
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "Missing production rollout configuration:" >&2
            for item in "${missing[@]}"; do
              echo "  - $item" >&2
            done
            echo "" >&2
            echo "Populate them in GitHub repo Settings > Secrets and variables > Actions," >&2
            echo "or run tool/sync_github_production_config.ps1 locally to seed the standard values." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: inputs.verify_after
        run: npm install --global vercel@latest

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref rkvrdzwlynyionsnwfiu --workdir backend

      - name: Materialize rollout env
        shell: bash
        run: |
          cat > .env <<EOF
          SUPABASE_URL=https://rkvrdzwlynyionsnwfiu.supabase.co
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET=${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET}
          INTERNAL_AUTOMATION_TOKEN=${INTERNAL_AUTOMATION_TOKEN}
          TRANSACTIONAL_EMAIL_PROVIDER=${TRANSACTIONAL_EMAIL_PROVIDER}
          TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT=${TRANSACTIONAL_EMAIL_PROVIDER_ENDPOINT}
          TRANSACTIONAL_EMAIL_PROVIDER_API_KEY=${TRANSACTIONAL_EMAIL_PROVIDER_API_KEY}
          TRANSACTIONAL_EMAIL_FROM_EMAIL=${TRANSACTIONAL_EMAIL_FROM_EMAIL}
          TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET=${TRANSACTIONAL_EMAIL_PROVIDER_WEBHOOK_SECRET}
          PUSH_NOTIFICATIONS_ENABLED=${PUSH_NOTIFICATIONS_ENABLED}
          PUSH_NOTIFICATIONS_PROVIDER=${PUSH_NOTIFICATIONS_PROVIDER}
          FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
          EOF

      - name: Push database migrations and seed data
        if: inputs.push_db
        run: supabase db push --linked --include-seed --workdir backend

      - name: Push Supabase config
        if: inputs.push_config
        run: supabase config push --project-ref rkvrdzwlynyionsnwfiu --workdir backend --yes

      - name: Sync Supabase cloud secrets
        if: inputs.sync_secrets
        shell: pwsh
        run: ./tool/sync_supabase_cloud_secrets.ps1

      - name: Deploy Edge Functions
        if: inputs.deploy_functions
        shell: bash
        run: |
          for dir in backend/supabase/functions/*; do
            if [[ -f "$dir/index.ts" ]]; then
              supabase functions deploy "$(basename "$dir")" --project-ref rkvrdzwlynyionsnwfiu --workdir backend
            fi
          done

      - name: Configure hosted scheduler
        if: inputs.configure_scheduler
        shell: pwsh
        run: ./tool/apply_supabase_scheduler.ps1 -EnvFile .env

      - name: Verify hosted rollout
        if: inputs.verify_after
        shell: pwsh
        run: ./tool/verify_hosted_rollout.ps1
