name: Production Flutter
run-name: >-
  Mobile release (${{
    github.event_name == 'push' && github.ref_name || inputs.release_tag
  }})

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build
        required: true
        default: main
      release_tag:
        description: "Release tag (example: v1.0.0)"
        required: true
      release_name:
        description: Optional release name
        required: false
      build_appbundle:
        description: Build signed Android App Bundle (.aab)
        type: boolean
        default: true
      build_apk:
        description: Build signed Android APK (.apk)
        type: boolean
        default: true
      publish_release:
        description: Publish GitHub release with built artifacts
        type: boolean
        default: true
      prerelease:
        description: Mark release as prerelease
        type: boolean
        default: false
      draft:
        description: Create release as draft
        type: boolean
        default: false
      validate_only:
        description: Validate the mobile release contract without building or publishing
        type: boolean
        default: false
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_name:
        required: false
        type: string
      build_appbundle:
        required: false
        type: boolean
        default: true
      build_apk:
        required: false
        type: boolean
        default: true
      publish_release:
        required: false
        type: boolean
        default: true
      prerelease:
        required: false
        type: boolean
        default: false
      draft:
        required: false
        type: boolean
        default: false
      validate_only:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: production-flutter-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  android-release:
    name: Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: Production
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      SENTRY_DSN: ${{ vars.SENTRY_DSN }}
      GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
      GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
      FLEETFILL_RELEASE_STORE_FILE: upload-keystore.jks
      FLEETFILL_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      FLEETFILL_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      FLEETFILL_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    outputs:
      performed_work: ${{ steps.plan.outputs.performed_work }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.git_ref }}

      - name: Resolve release intent
        id: plan
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" || "${{ inputs.validate_only }}" != "true" ]]; then
            echo "performed_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "performed_work=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate requested release shape
        if: github.event_name != 'push'
        run: |
          if [[ "${{ inputs.validate_only }}" == "true" ]]; then
            if [[ "${{ inputs.publish_release }}" == "true" ]]; then
              echo "validate_only mode cannot publish a GitHub release."
              exit 1
            fi
            exit 0
          fi

          if [[ "${{ inputs.build_appbundle }}" != "true" && "${{ inputs.build_apk }}" != "true" ]]; then
            echo "Select at least one artifact to build."
            exit 1
          fi
          if [[ "${{ inputs.publish_release }}" == "true" && "${{ inputs.build_appbundle }}" != "true" && "${{ inputs.build_apk }}" != "true" ]]; then
            echo "GitHub release publishing requires at least one built artifact."
            exit 1
          fi

      - name: Validate release tag matches mobile version
        run: |
          mobile_version="$(sed -n 's/^version: //p' apps/mobile/pubspec.yaml | head -n 1)"
          if [[ -z "$mobile_version" ]]; then
            echo "Could not resolve the mobile version from apps/mobile/pubspec.yaml."
            exit 1
          fi

          expected_tag="v${mobile_version}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            requested_tag="${GITHUB_REF_NAME}"
          else
            requested_tag="${{ inputs.release_tag }}"
          fi

          if [[ -z "$requested_tag" ]]; then
            echo "No mobile release tag was provided."
            exit 1
          fi

          if [[ "$requested_tag" != "$expected_tag" ]]; then
            echo "Release tag must match apps/mobile/pubspec.yaml."
            echo "Expected: $expected_tag"
            echo "Received: $requested_tag"
            exit 1
          fi

      - name: Verify release configuration is present
        if: steps.plan.outputs.performed_work == 'true'
        run: |
          missing=()

          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          }

          require_value "SUPABASE_URL (GitHub variable)" "${SUPABASE_URL}"
          require_value "SUPABASE_PUBLISHABLE_KEY (GitHub variable)" "${SUPABASE_PUBLISHABLE_KEY}"
          require_value "PUBLIC_SITE_URL (GitHub variable)" "${PUBLIC_SITE_URL}"
          require_value "SENTRY_DSN (GitHub variable)" "${SENTRY_DSN}"
          require_value "GOOGLE_WEB_CLIENT_ID (GitHub variable)" "${GOOGLE_WEB_CLIENT_ID}"
          require_value "GOOGLE_IOS_CLIENT_ID (GitHub variable)" "${GOOGLE_IOS_CLIENT_ID}"
          require_value "ANDROID_RELEASE_STORE_PASSWORD (GitHub secret)" "${FLEETFILL_RELEASE_STORE_PASSWORD}"
          require_value "ANDROID_RELEASE_KEY_ALIAS (GitHub secret)" "${FLEETFILL_RELEASE_KEY_ALIAS}"
          require_value "ANDROID_RELEASE_KEY_PASSWORD (GitHub secret)" "${FLEETFILL_RELEASE_KEY_PASSWORD}"

          if (( ${#missing[@]} > 0 )); then
            echo "Missing mobile release configuration:" >&2
            for item in "${missing[@]}"; do
              echo "  - $item" >&2
            done
            echo "" >&2
            echo "Populate them in GitHub Settings > Secrets and variables > Actions before rerunning this workflow." >&2
            exit 1
          fi

      - name: Set up Java
        if: steps.plan.outputs.performed_work == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        if: steps.plan.outputs.performed_work == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        if: steps.plan.outputs.performed_work == 'true'
        working-directory: apps/mobile
        run: flutter pub get

      - name: Materialize Android Firebase config
        if: steps.plan.outputs.performed_work == 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        working-directory: apps/mobile
        run: |
          if [[ -z "$GOOGLE_SERVICES_JSON" ]]; then
            echo "Missing ANDROID_GOOGLE_SERVICES_JSON (GitHub secret)." >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Materialize Android signing keystore
        if: steps.plan.outputs.performed_work == 'true'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        working-directory: apps/mobile
        run: |
          if [[ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]]; then
            echo "Missing ANDROID_RELEASE_KEYSTORE_BASE64 (GitHub secret)." >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build signed Android app bundle
        if: steps.plan.outputs.performed_work == 'true' && (github.event_name == 'push' || inputs.build_appbundle)
        working-directory: apps/mobile
        run: >
          flutter build appbundle --release
          --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}
          --dart-define=PUBLIC_SITE_URL=${{ env.PUBLIC_SITE_URL }}
          --dart-define=SENTRY_DSN=${{ env.SENTRY_DSN }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ env.GOOGLE_WEB_CLIENT_ID }}
          --dart-define=GOOGLE_IOS_CLIENT_ID=${{ env.GOOGLE_IOS_CLIENT_ID }}
          --dart-define=CRASH_REPORTING_ENABLED=true
          --dart-define=MAINTENANCE_MODE=false
          --dart-define=FORCE_UPDATE_REQUIRED=false

      - name: Build signed Android APK
        if: steps.plan.outputs.performed_work == 'true' && (github.event_name == 'push' || inputs.build_apk)
        working-directory: apps/mobile
        run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}
          --dart-define=PUBLIC_SITE_URL=${{ env.PUBLIC_SITE_URL }}
          --dart-define=SENTRY_DSN=${{ env.SENTRY_DSN }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ env.GOOGLE_WEB_CLIENT_ID }}
          --dart-define=GOOGLE_IOS_CLIENT_ID=${{ env.GOOGLE_IOS_CLIENT_ID }}
          --dart-define=CRASH_REPORTING_ENABLED=true
          --dart-define=MAINTENANCE_MODE=false
          --dart-define=FORCE_UPDATE_REQUIRED=false

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            if [[ -n "${{ inputs.release_name }}" ]]; then
              echo "name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
            else
              echo "name=FleetFill ${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            fi
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=FleetFill ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve artifact list
        id: artifacts
        if: steps.plan.outputs.performed_work == 'true'
        run: |
          files=()
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            files+=("apps/mobile/build/app/outputs/bundle/release/app-release.aab")
          elif [[ "${{ inputs.validate_only }}" != "true" && "${{ inputs.build_appbundle }}" == "true" ]]; then
            files+=("apps/mobile/build/app/outputs/bundle/release/app-release.aab")
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            files+=("apps/mobile/build/app/outputs/flutter-apk/app-release.apk")
          elif [[ "${{ inputs.validate_only }}" != "true" && "${{ inputs.build_apk }}" == "true" ]]; then
            files+=("apps/mobile/build/app/outputs/flutter-apk/app-release.apk")
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: steps.plan.outputs.performed_work == 'true' && (github.event_name == 'push' || inputs.publish_release)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.release_meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: ${{ steps.artifacts.outputs.files }}

      - name: Complete no-op validation
        if: steps.plan.outputs.performed_work != 'true'
        run: echo "validate_only mode completed without building or publishing mobile artifacts."
