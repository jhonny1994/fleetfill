name: Supabase Validation

on:
  push:
    branches:
      - main
      - phase14-16-release-readiness
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset --yes

      - name: Lint database
        run: supabase db lint --debug

      - name: Run runtime security tests
        run: supabase test db "supabase/tests/runtime_security_test.sql"

      - name: Run runtime email tests
        run: supabase test db "supabase/tests/runtime_email_test.sql"

      - name: Stop local Supabase
        if: always()
        run: supabase stop
