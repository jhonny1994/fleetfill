name: Supabase Validation

on:
  push:
    branches:
      - main
      - phase14-16-release-readiness
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      APP_ENV: local
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID != '' && vars.GOOGLE_WEB_CLIENT_ID || 'dummy-google-web-client-id.apps.googleusercontent.com' }}
      GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID != '' && vars.GOOGLE_IOS_CLIENT_ID || 'dummy-google-ios-client-id.apps.googleusercontent.com' }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID != '' && vars.GOOGLE_WEB_CLIENT_ID || 'dummy-google-web-client-id.apps.googleusercontent.com' }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET != '' && secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET || 'dummy-google-client-secret' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Materialize local Supabase env
        shell: bash
        run: |
          cat > .env <<EOF
          APP_ENV=${APP_ENV}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}
          GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID=${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET=${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET}
          EOF

      - name: Start local Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset --yes

      - name: Lint database
        run: supabase db lint --debug

      - name: Run runtime security tests
        run: supabase test db "supabase/tests/runtime_security_test.sql"

      - name: Run runtime email tests
        run: supabase test db "supabase/tests/runtime_email_test.sql"

      - name: Stop local Supabase
        if: always()
        run: supabase stop
