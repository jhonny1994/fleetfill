name: Flutter Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
      GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify mobile secret-bearing files are not tracked
        shell: bash
        run: |
          if git ls-files | grep -E '(^android/app/google-services\.json$|firebase-adminsdk|service-account)'; then
            echo "Tracked Firebase or service-account files are not allowed in git."
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated localization output
        run: dart run intl_utils:generate

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: flutter test

