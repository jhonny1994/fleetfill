name: Production Admin Web
run-name: >-
  Admin Web deploy (${{
    inputs.git_ref || github.ref_name
  }})

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
      sync_env:
        description: Sync production Vercel env before deploy
        type: boolean
        default: true
      build:
        description: Build admin-web with Vercel
        type: boolean
        default: true
      deploy:
        description: Publish production deploy
        type: boolean
        default: true
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      sync_env:
        required: false
        type: boolean
        default: true
      build:
        required: false
        type: boolean
        default: true
      deploy:
        required: false
        type: boolean
        default: true

concurrency:
  group: production-admin-web
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy Admin Web
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: Production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_ADMIN_WEB_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    outputs:
      performed_work: ${{ steps.plan.outputs.performed_work }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Resolve deploy intent
        id: plan
        run: |
          if [[ "${{ inputs.sync_env }}" == "true" || "${{ inputs.build }}" == "true" || "${{ inputs.deploy }}" == "true" ]]; then
            echo "performed_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "performed_work=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate requested deploy shape
        run: |
          if [[ "${{ inputs.deploy }}" == "true" && "${{ inputs.build }}" != "true" ]]; then
            echo "Production deploy requires a production build in the same workflow run."
            exit 1
          fi

      - name: Verify deploy configuration is present
        if: steps.plan.outputs.performed_work == 'true'
        run: |
          missing=()

          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          }

          require_value "VERCEL_TOKEN (GitHub secret or Production environment secret)" "$VERCEL_TOKEN"
          require_value "VERCEL_ORG_ID (GitHub variable)" "$VERCEL_ORG_ID"
          require_value "VERCEL_ADMIN_WEB_PROJECT_ID (GitHub variable)" "$VERCEL_PROJECT_ID"
          if [[ "$VERCEL_TOKEN" == vca_* ]]; then
            echo "GitHub secret VERCEL_TOKEN is a short-lived CLI session token (vca_*)." >&2
            echo "Replace it with a long-lived Vercel dashboard token before running Production Admin Web." >&2
            exit 1
          fi
          if [[ "${{ inputs.sync_env }}" == "true" ]]; then
            require_value "SUPABASE_ACCESS_TOKEN (GitHub secret)" "$SUPABASE_ACCESS_TOKEN"
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "Missing production admin-web deploy configuration:" >&2
            for item in "${missing[@]}"; do
              echo "  - $item" >&2
            done
            echo "" >&2
            echo "Populate them in GitHub Settings > Secrets and variables > Actions before rerunning this workflow." >&2
            exit 1
          fi

      - name: Set up pnpm
        if: steps.plan.outputs.performed_work == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        if: steps.plan.outputs.performed_work == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/admin-web/pnpm-lock.yaml

      - name: Set up Supabase CLI
        if: steps.plan.outputs.performed_work == 'true' && inputs.sync_env
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Vercel CLI
        if: steps.plan.outputs.performed_work == 'true'
        run: npm install --global vercel@latest

      - name: Install dependencies
        if: steps.plan.outputs.performed_work == 'true'
        working-directory: apps/admin-web
        run: pnpm install --frozen-lockfile

      - name: Sync Vercel production env
        if: steps.plan.outputs.performed_work == 'true' && inputs.sync_env
        shell: pwsh
        run: ./tool/sync_admin_vercel_env.ps1 -ProjectDir .

      - name: Pull production environment
        if: steps.plan.outputs.performed_work == 'true'
        run: pnpm dlx vercel pull --yes --environment=production --cwd . --token=${{ env.VERCEL_TOKEN }}

      - name: Build production deployment
        if: steps.plan.outputs.performed_work == 'true' && inputs.build
        run: pnpm dlx vercel build --prod --cwd . --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy production
        if: steps.plan.outputs.performed_work == 'true' && inputs.deploy
        run: pnpm dlx vercel deploy --prebuilt --prod --cwd . --token=${{ env.VERCEL_TOKEN }}

      - name: Complete no-op validation
        if: steps.plan.outputs.performed_work != 'true'
        run: echo "No admin-web release actions were selected; reusable workflow validated inputs only."
