name: Bug report
description: Report a reproducible product or repository issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Mobile app
        - Admin web
        - Backend / Supabase
        - CI / CD
        - Documentation
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue clearly and briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
