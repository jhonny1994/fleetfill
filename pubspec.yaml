name: fleetfill
description: "FleetFill mobile freight marketplace for Algeria."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  file_picker: ^10.3.2
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.12.0
  syncfusion_flutter_pdfviewer: ^33.1.44
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.13.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  go_router_builder: ^4.2.0
  integration_test:
    sdk: flutter
  intl_utils: ^2.8.14
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  very_good_analysis: ^10.2.0

flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/l10n/generated

flutter:
  uses-material-design: true
